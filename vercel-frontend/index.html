<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Course Enrollment Assistant">
    <title>🎓 AI Enrollment Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="badge">AI Powered</div>
            <h1>Course Enrollment Agent</h1>
            <p>Tell us about your background, and our AI will recommend the perfect learning path for you.</p>
        </header>

        <div class="card">
            <form id="enrollmentForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="e.g., Rahul Sharma" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g., rahul@example.com" required>
                </div>

                <div class="form-group">
                    <label for="skills">Current Skills</label>
                    <textarea id="skills" rows="3" placeholder="e.g., Python, SQL, Communication..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="career_goal">Career Goal</label>
                    <input type="text" id="career_goal" placeholder="e.g., Data Scientist" required>
                </div>

                <div class="form-group">
                    <label for="gpa">GPA (Out of 10.0)</label>
                    <div class="gpa-control">
                        <input type="range" id="gpa" min="0" max="10" step="0.1" value="7.5">
                        <span id="gpa-value">7.5</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn">
                    <span>Get AI Recommendation</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="resultCard" class="result-card hidden">
                <h3>Success!</h3>
                <p>Your application was sent to our AI system.</p>
                <p class="small-text">Check your email for your personalized recommendation.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
